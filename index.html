<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" href="favicon.png" type="image/png">
  <title>RHLxRHL</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-2: #121212;
      --panel: rgba(255, 255, 255, 0.04);
      --panel-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.12);
      --border-strong: rgba(255, 255, 255, 0.22);
      --text: #f5f5f5;
      --muted: rgba(245, 245, 245, 0.68);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 28%),
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.04), transparent 20%),
        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.03), transparent 18%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.03), transparent 35%),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05), transparent 55%);
      opacity: 0.8;
    }

    .shell {
      width: min(960px, 100%);
      padding: 32px;
      position: relative;
      z-index: 1;
    }

    .hero {
      display: grid;
      gap: 18px;
      align-items: center;
      justify-items: center;
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      overflow: hidden;
      user-select: none;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 5vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      font-weight: 800;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(255,255,255,0.08);
    }

    .subtitle {
      margin: 0;
      max-width: 54ch;
      color: var(--muted);
      font-size: clamp(0.98rem, 1.8vw, 1.08rem);
      line-height: 1.6;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 170px;
      padding: 22px;
      text-decoration: none;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.16), transparent 35%);
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--border-strong);
      background: var(--panel-hover);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.5);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .platform {
      font-size: 0.92rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
    }

    .arrow {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.7);
      transition: transform 180ms ease;
    }

    .card:hover .arrow {
      transform: translate(2px, -2px);
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 18px 0 8px;
      letter-spacing: 0.01em;
    }

    .card-desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.98rem;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 820px) {
      .links {
        grid-template-columns: 1fr;
      }

      .shell {
        padding: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="backdrop"></div>

  <main class="shell">
    <section class="hero" aria-label="Site introduction">
      <div class="logo" aria-hidden="true">
        <img src="logo.png" alt="" />
      </div>
      <h1>RHLxRHL</h1>
    </section>

    <section class="links" aria-label="External links">
      <a class="card" href="https://www.patreon.com/cw/RHLxRHL" target="_blank" rel="noopener noreferrer">
        <div class="card-top">
          <span class="platform">Patreon</span>
          <span class="arrow">↗</span>
        </div>
        <div>
          <div class="card-title">Become a Patron</div>
          <p class="card-desc">Help me keep creating art full-time.</p>
        </div>
      </a>

      <a class="card" href="https://www.deviantart.com/rhlxrhl" target="_blank" rel="noopener noreferrer">
        <div class="card-top">
          <span class="platform">DeviantArt</span>
          <span class="arrow">↗</span>
        </div>
        <div>
          <div class="card-title">See My Art</div>
          <p class="card-desc">Explore most of the visual work.</p>
        </div>
      </a>

      <a class="card" href="https://x.com/RHLxRHL" target="_blank" rel="noopener noreferrer">
        <div class="card-top">
          <span class="platform">X</span>
          <span class="arrow">↗</span>
        </div>
        <div>
          <div class="card-title">Find Me on X</div>
          <p class="card-desc">Check updates and short posts.</p>
        </div>
      </a>
    </section></main>
</body>
</html>
